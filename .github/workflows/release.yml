name: Release

# Publishes to npm when a GitHub Release is created.
# Requires an NPM_TOKEN repository secret (npm access token with publish rights).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Keeps the floating v1 tag on the latest v1.x.y release so
      # `uses: formalness/shipready@v1` always resolves to the newest release.
      - name: Update floating v1 tag
        if: startsWith(github.event.release.tag_name, 'v1.')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f v1 "${{ github.event.release.tag_name }}"
          git push origin v1 --force
